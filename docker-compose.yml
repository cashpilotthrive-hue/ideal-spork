services:
  app:
    image: mcr.microsoft.com/devcontainers/universal:linux
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    command: bash -c "bash setup.sh && tail -f /dev/null"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/devdb
      REDIS_URL: redis://redis:6379

  agent:
    image: python:3.11-slim
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: python agents/agent.py
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  orchestrator:
    image: python:3.11-slim
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: python orchestrator.py
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
